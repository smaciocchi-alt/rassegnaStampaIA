name: Aggiornamento Automatico Rassegna Stampa
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Controlla il codice sorgente
        uses: actions/checkout@v5

      - name: Configura Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Scarica e scrivi la rassegna stampa italiana
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');

          const query = encodeURIComponent('\"Intelligenza Artificiale\" (site:repubblica.it OR site:corriere.it OR site:ilsole24ore.com OR site:lastampa.it OR site:ansa.it OR site:wired.it OR site:punto-informatico.it OR site:hwupgrade.it OR site:tomshw.it OR site:agendadigitale.eu)');
          const sourceUrl = 'https://news.google.com/rss/search?q=' + query + '&hl=it&gl=IT&ceid=IT:it';

          // Funzione interna per ripulire i geroglifici HTML e le entità letterali
          function pulisciTesto(testo) {
            if (!testo) return '';
            return testo
              .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, '$1') // Rimuove blocchi CDATA
              .replace(/<[^>]*>/g, '')                      // Rimuove qualsiasi tag HTML aperto/chiuso (es: <b>)
              .replace(/&lt;[^&]*&gt;/g, '')                // Rimuove tag HTML mascherati (es: &lt;b&gt;)
              .replace(/&quot;/g, '\"')                     // Sistema le virgolette doppie
              .replace(/&amp;/g, '&')                      // Sistema la e commerciale
              .replace(/&apos;/g, '\'')                     // Sistema l\'apostrofo
              .replace(/&lt;/g, '<')                        // Sistema il minore
              .replace(/&gt;/g, '>')                        // Sistema il maggiore
              .replace(/&nbsp;/g, ' ')                      // Sistema gli spazi vuoti
              .replace(/\n/g, ' ')                          // Rimuove gli a capo molesti
              .trim();
          }

          https.get(sourceUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } }, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              const items = [];
              const matches = data.matchAll(/<item>([\s\S]*?)<\/item>/g);
              let count = 0;
              
              for (const match of matches) {
                if (count >= 8) break;
                const content = match[1];
                
                let title = content.match(/<title>([\s\S]*?)<\/title>/)?.[1] || '';
                title = pulisciTesto(title);
                
                let sourceName = 'Testata Nazionale';
                const sourceMatch = title.match(/ - ([^-]+)$/);
                if (sourceMatch) {
                  sourceName = sourceMatch[1].trim();
                  title = title.replace(/ - [^-]+$/, '').trim();
                }

                const link = content.match(/<link>([\s\S]*?)<\/link>/)?.[1].trim() || '#';
                
                let description = content.match(/<description>([\s\S]*?)<\/description>/)?.[1] || '';
                description = pulisciTesto(description);

                if (description.length < 10 || description.toLowerCase().includes('visualizza copertura completa')) {
                  description = 'Approfondisci l\'analisi e leggi l\'articolo completo direttamente sulla fonte ufficiale.';
                }

                const pubDate = content.match(/<pubDate>([\s\S]*?)<\/pubDate>/)?.[1] || '';
                const cleanDate = pubDate ? new Date(pubDate).toLocaleDateString('it-IT') : new Date().toLocaleDateString('it-IT');
                
                items.push({ 
                  title: title, 
                  link: link, 
                  date: cleanDate, 
                  description: description + ' (Fonte: ' + sourceName + ')'
                });
                count++;
              }

              if (items.length > 0) {
                let html = fs.readFileSync('index.html', 'utf8');
                const jsonString = JSON.stringify(items, null, 2);
                html = html.replace(/const newsData = \[([\s\S]*?)\];/, 'const newsData = ' + jsonString + ';');
                fs.writeFileSync('index.html', html);
                console.log('Rassegna italiana aggiornata e ripulita dai simboli HTML.');
              } else {
                console.error('Nessuna notizia trovata con i filtri impostati.');
              }
            });
          }).on('error', (e) => {
            console.error('Errore: ' + e.message);
          });
          "

      - name: Commit e Push dei cambiamenti
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Automazione: Pulizia caratteri speciali completata" || exit 0
          git push
